name: Test OIDC

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::037077641482:role/GitHubActionsRole
          aws-region: us-east-1

      - name: Print AWS Account
        run: aws sts get-caller-identity
